<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de descuentos - Parcial Programacion III</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components/carta.css">
    <link rel="stylesheet" href="css/components/boton.css">
    <link rel="stylesheet" href="css/components/resultado.css">
</head>
<body>

    <main class="calculadoraContenedor">
        
            <h1 class="titulo">Calculadora de descuentos encadenados</h1>
            <h4 class="subtitulo">esta app calcula descuentos uno atras de otro sobre el mismo producto.</h4>

            <div class="formulario">

                <div class="carta">
                    <label for="precio">Precio original</label>
                    <input type="number" id="precio" placeholder="Ej: 15000" min="0" step="0.01">
                </div>

                <!-- Contenedor dinámico de descuentos -->
                <!-- El JS agrega/quita cartas acá con agregarCampoDescuento() -->
                <div id="contenedor-descuentos">

                    <!-- Primer descuento: está hardcodeado, el JS lo toma con .input-descuento -->
                    <div class="carta">
                        <label>Descuento numero 1 </label>
                        <div class="input-fila">
                            <input type="number"
                                    class="input-descuento"
                                    placeholder="Ej: 10"
                                    min="1"
                                    max="90">
                        </div>
                        <span class="error-campo"></span>
                    </div>

                </div>

                <!-- Mensaje de error global -->
                <p id="mensaje-error"></p>

                <!-- Botones -->
                <div class="botones">
                    <button type="button" id="BTNagregar">+ Agregar descuento</button>
                    <button type="button" id="BTNcalcular">Calcular</button>
                    <button type="button" id="BTNlimpiar">Limpiar todo</button>
                </div>

            </div>

            <div class="resultados">
                <p>Precio final: <span id="Final">$-</span></p>
                <p>Ahorro total: <span id="Ahorro">$-</span></p>
                <div id="pasos"></div>
            </div>
            
    </main>

    <script src="js/script.js"></script>
</body>
</html>
